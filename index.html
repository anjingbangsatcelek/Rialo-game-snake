<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Game Snake</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        .social-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .social-btn { display: inline-flex; align-items: center; padding: 6px 12px; font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; text-decoration: none; border-radius: 20px; transition: all 0.3s ease; }
        .discord-btn { background-color: #5865F2; color: #ffffff !important; border: 1px solid #727ed4; }
        .twitter-btn { background-color: #000000; color: #ffffff !important; border: 1px solid #333333; }
        .social-btn:hover { transform: translateY(-3px); box-shadow: 0 0 15px currentColor; filter: brightness(1.2); }
        .overlay { background: rgba(10, 10, 10, 0.95) !important; border: 2px solid #ffdd53; box-shadow: inset 0 0 30px rgba(255, 221, 83, 0.2), 0 0 20px rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        #overlay-title { font-size: 28px !important; color: #ffdd53 !important; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255, 221, 83, 0.6), 2px 2px #000; animation: textPulse 2s infinite alternate; margin-bottom: 5px; }
        #overlay-text { font-size: 13px !important; color: #a0a0a0 !important; font-family: 'Courier New', monospace; margin-bottom: 25px; }
        #start-btn { background: linear-gradient(45deg, #ffdd53, #ffb800) !important; color: #121212 !important; font-weight: bold !important; border: none !important; padding: 12px 30px !important; font-size: 14px !important; border-radius: 25px !important; cursor: pointer; box-shadow: 0 0 15px rgba(255, 221, 83, 0.4) !important; transition: transform 0.2s, box-shadow 0.2s !important; letter-spacing: 1px; }
        #start-btn:hover { transform: scale(1.08) !important; box-shadow: 0 0 25px rgba(255, 221, 83, 0.8) !important; }
        .footer-link { color: #ffdd53 !important; text-decoration: none; font-weight: bold; margin-left: 5px; }
        .footer-link:hover { text-decoration: underline; }
        @keyframes textPulse { from { text-shadow: 0 0 8px rgba(255, 221, 83, 0.5); } to { text-shadow: 0 0 20px rgba(255, 221, 83, 0.9), 0 0 30px #ffdd53; } }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="https://actions.google.com/sounds/v1/science_fiction/space_ambient.ogg" type="audio/ogg">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <img id="rialoLogoSource" src="IMG_3277.jpeg" alt="Rialo Logo Source" style="display: none;">
    <div class="game-container">
        <header>
            <div class="social-container">
                <a href="https://discord.gg/rialoprotocol" target="_blank" class="social-btn discord-btn">💬 Discord</a>
                <a href="https://x.com/rialohq?s=21" target="_blank" class="social-btn twitter-btn">✕ Twitter</a>
            </div>
            <div class="logo-container"><img src="IMG_3277.jpeg" alt="Rialo Logo" class="rialo-logo"></div>
            <h1>RIALO GAME SNAKE</h1>
            <div class="scoreboard"><span id="score">SCORE: 0</span><span id="highScore">HIGH SCORE: 0</span></div>
        </header>
        <main class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">🛸 SPACE MISSION</h2>
                <p id="overlay-text">Siapkan diri untuk mencetak skor tertinggi global!</p>
                <button id="start-btn">MULAI BERMAIN</button>
            </div>
        </main>
        <section class="leaderboard-section">
            <h3>🏆 TOP 5 LEADERBOARD GLOBAL</h3>
            <ol id="leaderboard-list"><li><span class="rank-name">Memuat data...</span></li></ol>
        </section>
        <div class="mobile-controls">
            <button class="ctrl-btn up" id="ctrl-up">▲</button>
            <div class="middle-row">
                <button class="ctrl-btn left" id="ctrl-left">◀</button>
                <div class="spacer"></div>
                <button class="ctrl-btn right" id="ctrl-right">▶</button>
            </div>
            <button class="ctrl-btn down" id="ctrl-down">▼</button>
        </div>
        <footer>
            <p class="credits">By Felix X Cadis0871 <a href="https://x.com/felixxx_0x?s=21" target="_blank" class="footer-link">(@felixxx_0x)</a></p>
        </footer>
    </div>
    <script>
        const firebaseConfig = {

            authDomain: "game-leaderboard-9498c.firebaseapp.com",

            measurementId: "G-FE3Q7JB02X"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>
    <script src="game.js"></script>
</body>
</html>
