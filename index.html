<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rialo Game Snake</title>
    
    <!-- Semua desain langsung disatukan di sini agar rapi -->
    <style>
        /* Desain Header Modern & Bersih */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .social-btn {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }
        .discord-btn {
            background: linear-gradient(135deg, #5865F2, #4752C4);
            color: #ffffff !important;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }
        .twitter-btn {
            background: linear-gradient(135deg, #14171A, #000000);
            color: #ffffff !important;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px currentColor;
            filter: brightness(1.1);
        }

        /* Area Canvas yang Lebih Presisi */
        .game-area-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Tampilan Overlay Kaca Elegan (Glassmorphism) */
        .overlay {
            background: rgba(18, 18, 18, 0.85) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 221, 83, 0.2);
            transition: all 0.5s ease;
        }
        #overlay-title {
            font-size: 26px !important;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 800;
            color: #ffdd53 !important;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 221, 83, 0.4);
            margin-bottom: 8px;
        }
        #overlay-text {
            font-size: 13px !important;
            color: #cccccc !important;
            font-family: -apple-system, sans-serif;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        #start-btn {
            background: #ffdd53 !important;
            color: #121212 !important;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 700 !important;
            border: none !important;
            padding: 14px 36px !important;
            font-size: 14px !important;
            border-radius: 30px !important;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 221, 83, 0.3) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            letter-spacing: 0.5px;
        }
        #start-btn:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 12px 30px rgba(255, 221, 83, 0.5) !important;
        }

        .footer-link {
            color: #ffdd53 !important;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }
        
        .mobile-controls {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Desain Bar Informasi Level Baru */
        .game-status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin: 5px auto 10px auto;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 12px;
            font-weight: bold;
        }
        #level-display {
            color: #ffdd53;
            background: rgba(255, 221, 83, 0.1);
            padding: 3px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 221, 83, 0.3);
        }
        #speed-display {
            color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            padding: 3px 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <!-- Sistem Audio (Musik Bruno Mars Pilihanmu & SFX) -->
    <audio id="bgMusic" loop preload="auto">
        <source src="Bruno Mars - Risk it All (Koplo is Me Remix).mp3" type="audio/mpeg">
    </audio>
    <audio id="sfxEat" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav" type="audio/wav">
    </audio>
    <audio id="sfxGameOver" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2958/2958-84.wav" type="audio/wav">
    </audio>

    <img id="rialoLogoSource" src="IMG_3277.jpeg" alt="Rialo Logo Source" style="display: none;">

    <div class="game-container">
        <header>
            <div class="social-container">
                <a href="https://discord.gg/rialoprotocol" target="_blank" class="social-btn discord-btn">💬 Discord</a>
                <a href="https://x.com/rialohq?s=21" target="_blank" class="social-btn twitter-btn">✕ Twitter</a>
            </div>

            <div class="logo-container">
                <img src="IMG_3277.jpeg" alt="Rialo Logo" class="rialo-logo">
            </div>
            <h1>RIALO GAME SNAKE</h1>
            <div class="scoreboard">
                <span id="score">SCORE: 0</span>
                <span id="highScore">HIGH SCORE: 0</span>
            </div>

            <!-- Tampilan Level & Stats Tambahan -->
            <div class="game-status-bar">
                <span id="level-display">🚀 LEVEL: 1</span>
                <span id="speed-display">⚡ SPEED: 1.0x</span>
            </div>
        </header>

        <div class="game-area-wrapper">
            <main class="game-area" id="swipeGameArea">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <div id="overlay" class="overlay">
                    <h2 id="overlay-title">🛸 SPACE MISSION</h2>
                    <p id="overlay-text">Geser layar ponselmu untuk mengendalikan misi.</p>
                    <button id="start-btn">MULAI BERMAIN</button>
                </div>
            </main>
        </div>

        <section class="leaderboard-section">
            <h3>🏆 TOP 5 LEADERBOARD GLOBAL</h3>
            <ol id="leaderboard-list">
                <li><span class="rank-name">Memuat data...</span></li>
            </ol>
        </section>

        <footer>
            <p class="credits">
                By Felix X Cadis0871 
                <a href="https://x.com/felixxx_0x?s=21" target="_blank" class="footer-link">(@felixxx_0x)</a>
            </p>
        </footer>
    </div>
