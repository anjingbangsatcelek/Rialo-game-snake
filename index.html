<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rialo Game Snake</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <img id="rialoLogoSource" src="IMG_3277.jpeg" alt="Rialo Logo Source" style="display: none;">

    <div class="game-container">
        <header>
            <div class="logo-container">
                <img src="IMG_3277.jpeg" alt="Rialo Logo" class="rialo-logo">
            </div>
            <h1>RIALO GAME SNAKE</h1>
            <div class="scoreboard">
                <span id="score">SCORE: 0</span>
                <span id="highScore">HIGH SCORE: 0</span>
            </div>
        </header>

        <main class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="overlay" class="overlay">
                <h2 id="overlay-title">SPACE MISSION</h2>
                <p id="overlay-text">Tekan tombol di bawah untuk memulai</p>
                <button id="start-btn">MULAI GAME</button>
            </div>
        </main>

        <section class="leaderboard-section">
            <h3>🏆 TOP 5 LEADERBOARD GLOBAL</h3>
            <ol id="leaderboard-list">
                <li><span class="rank-name">Memuat data...</span></li>
            </ol>
        </section>

        <div class="mobile-controls">
            <button class="ctrl-btn up" id="ctrl-up">▲</button>
            <div class="middle-row">
                <button class="ctrl-btn left" id="ctrl-left">◀</button>
                <div class="spacer"></div>
                <button class="ctrl-btn right" id="ctrl-right">▶</button>
            </div>
            <button class="ctrl-btn down" id="ctrl-down">▼</button>
        </div>

        <footer>
            <p class="credits">By Felix X Cadis0871</p>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBu58SPDb6V6hIyFoxnYgoPia90N1c-7iA",
            authDomain: "game-leaderboard-9498c.firebaseapp.com",
            databaseURL: "https://game-leaderboard-9498c-default-rtdb.firebaseio.com",
            projectId: "game-leaderboard-9498c",
            storageBucket: "game-leaderboard-9498c.firebasestorage.app",
            messagingSenderId: "11880113468",
            appId: "1:11880113468:web:5b6136228a99dde4756a39",
            measurementId: "G-FE3Q7JB02X"
        };

        // Inisialisasi ke sistem game
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>

    <script src="game.js"></script>
</body>
</html>
